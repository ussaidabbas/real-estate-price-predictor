<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghar Qeemat — Property Price Estimator</title>
<style>
  :root {
    --bg: #10192E;
    --card: #17233F;
    --card-border: #27365C;
    --teal: #2EC4B6;
    --teal-dim: #1B8C82;
    --gold: #CFA24C;
    --text: #EDEFF5;
    --text-dim: #8C96B3;
    --error: #E36767;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 20px;
  }
  .wrap { width: 100%; max-width: 680px; }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 10px;
  }
  h1 { font-size: 34px; margin: 0 0 8px 0; color: #fff; }
  .sub { color: var(--text-dim); font-size: 15px; margin: 0 0 28px 0; }
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 28px;
  }
  .field { margin-bottom: 18px; }
  label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
  input, select {
    width: 100%;
    padding: 11px 12px;
    background: #0D1526;
    border: 1px solid var(--card-border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
  }
  .row { display: flex; gap: 14px; }
  .row .field { flex: 1; }
  button {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    background: var(--teal);
    color: #0A1220;
    font-weight: 600;
    font-size: 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  button:hover { background: #45D6C9; }
  #result {
    margin-top: 24px;
    padding: 22px;
    border-radius: 10px;
    background: #0D1526;
    border: 1px solid var(--card-border);
    display: none;
  }
  #result.show { display: block; }
  .price-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 30px;
    font-weight: 600;
    color: var(--gold);
  }
  .error-box {
    margin-top: 20px;
    padding: 14px 16px;
    border-radius: 8px;
    background: rgba(227,103,103,0.1);
    border: 1px solid var(--error);
    color: var(--error);
    font-size: 14px;
    display: none;
  }
  .error-box.show { display: block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Karachi &amp; Lahore</div>
  <h1>What's this property actually worth?</h1>
  <p class="sub">Enter the details below and get an instant price estimate.</p>

  <div class="card">
    <form id="predict-form">
      <div class="row">
        <div class="field">
          <label for="city">City</label>
          <select id="city" required>
            <option value="">Select city</option>
            {% for c in cities %}
            <option value="{{ c }}">{{ c }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="field">
          <label for="property_type">Property Type</label>
          <select id="property_type" required>
            <option value="">Select type</option>
            {% for pt in property_types %}
            <option value="{{ pt }}">{{ pt }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="field">
        <label for="location">Location / Area</label>
        <input type="text" id="location" placeholder="e.g. DHA Defence, Bahria Town, Gulberg" required>
      </div>

      <div class="row">
        <div class="field">
          <label for="bedrooms">Bedrooms</label>
          <input type="number" id="bedrooms" min="0" max="20" value="3" required>
        </div>
        <div class="field">
          <label for="baths">Bathrooms</label>
          <input type="number" id="baths" min="0" max="20" value="2" required>
        </div>
        <div class="field">
          <label for="area">Area (Marla)</label>
          <input type="number" id="area" min="0.1" step="0.1" value="10" required>
        </div>
      </div>

      <button type="submit" id="submit-btn">Estimate Price</button>
    </form>

    <div id="result">
      <div style="font-size:12px;color:#8C96B3;text-transform:uppercase;margin-bottom:6px;">Estimated Price</div>
      <div class="price-value" id="price-value">—</div>
    </div>

    <div class="error-box" id="error-box"></div>
  </div>
</div>

<script>
const form = document.getElementById('predict-form');
const btn = document.getElementById('submit-btn');
const resultBox = document.getElementById('result');
const errorBox = document.getElementById('error-box');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  resultBox.classList.remove('show');
  errorBox.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Calculating...';

  const payload = {
    city: document.getElementById('city').value,
    location: document.getElementById('location').value,
    property_type: document.getElementById('property_type').value,
    bedrooms: Number(document.getElementById('bedrooms').value),
    baths: Number(document.getElementById('baths').value),
    area: Number(document.getElementById('area').value),
  };

  try {
    const res = await fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Something went wrong.');

    document.getElementById('price-value').textContent = data.predicted_price_formatted;
    resultBox.classList.add('show');
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Estimate Price';
  }
});
</script>
</body>
</html>
